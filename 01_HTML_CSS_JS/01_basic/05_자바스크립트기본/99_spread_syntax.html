      fetch('https://jsonplaceholder.typicode.com/todos/1')
        .then((response) => {
          return response.json();
        })
        .then((data) => {
          console.log('가져온 데이터:', data);

          //추가를 해야한다 했을 때
          const extendedDate = { ...data, completed: true };
          console.log('추가된 데이터:', extendedDate);
        })
        .catch((error) => {
