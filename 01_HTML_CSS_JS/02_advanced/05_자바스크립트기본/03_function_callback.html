<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      function cellTenTimes(callback, n) {
        for (let i = 0; i < n; i++) {
          callback();
        }
      }

      let fun = function () {
        alert('함수 호출');
      };

      cellTenTimes(fun, 10);
    </script>
  </head>

  <body></body>
</html>
