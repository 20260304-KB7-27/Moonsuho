<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Script스니펫</title>
    <script>
      window.onload = function () {
        //querySelectorALL
        //주어진 CSS 선택자에 일치하는 모든 요소를 선택 (Nodelist로 반환 (유사배열))
        const headers = document.querySelectorAll('h1');
        const header = document.querySelectorAll('h1')[2];
        header.style.color = 'orange';
        console.log(headers);

        for (let i = 0; i < headers.length; i++) {
          let header = headers[i];
          header.style.color = 'red';
        }
      };
    </script>
  </head>

  <body>
    <h1>Header</h1>
    <h1 class="classtest">Header</h1>
    <h1 id="idtest">Header</h1>
  </body>
</html>
