<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      const PI = 3.141592;
      let radius = 10;
      function calculateArea(radius) {
        return radius * radius * PI;
      }
      alert(calculateArea(radius));
    </script>
  </head>
