<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Composition</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      잔고: <input v-model.model="balance" />
      <br />
      회원님의 등급:
      <span v-if="balance >=1000000" bal>Gold</span>
      <span v-else-if="balance >= 500000">Silver</span>
      <span v-else-if="balance >= 200000">Bronze</span>
      <span v-else>Basic</span>
    </div>

    <script>
      const { createApp, ref } = Vue;

      createApp({
        setup() {
          const balance = ref(0);
          return { balance };
        },
      }).mount('#app');
    </script>
  </body>
</html>
