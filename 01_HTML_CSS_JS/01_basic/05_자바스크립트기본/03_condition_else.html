<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // var

      // let 일반적인 변수
      //const 상수 (값이 변경되면 안될 때)

      let date = new Date();

      let hours = date.getHours();
      let month = date.getMonth();
      if (hours < 12) {
        alert('오전입니다');
      } else {
        alert('오후입니다');
      }
      console.log(month + 1);
    </script>
  </head>

  <body></body>
</html>
